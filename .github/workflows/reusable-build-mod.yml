name: Reusable Dalamud Mod Build

on:
  workflow_call:
    inputs:
      mod_name:
        required: true
        type: string
      workflow_mode:
        required: false
        type: string
        default: sync
      mod_version:
        required: true
        type: string
      mod_repo_url:
        required: true
        type: string
      mod_ref:
        required: true
        type: string
      mod_repo_dir:
        required: false
        type: string
        default: AutoRetainer
      localizer_source_subpaths:
        required: true
        type: string
      localizer_dict_path:
        required: true
        type: string
      build_project_path:
        required: true
        type: string
      package_build_dir:
        required: true
        type: string
      artifact_basename:
        required: true
        type: string
      release_tag_prefix:
        required: true
        type: string
      package_include_patterns:
        required: true
        type: string
      dalamud_asset_url:
        required: true
        type: string
      dalamud_assets_json_url:
        required: true
        type: string
      dalamud_required_files:
        required: true
        type: string
      commit_changes:
        required: false
        type: boolean
        default: true
      publish_release:
        required: false
        type: boolean
        default: false
      template_repo:
        required: false
        type: string
        default: mcc1/dalamud-mod-localizer
      template_ref:
        required: false
        type: string
        default: main
      translation_smoke_test_patterns:
        required: false
        type: string
        default: ""
      consumer_patch_glob:
        required: false
        type: string
        default: ".consumer-patches/*.patch"

jobs:
  build-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Consumer Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Shared Template
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.template_repo }}
          ref: ${{ inputs.template_ref }}
          path: .template

      - name: Ensure Shared Scripts Are Executable
        run: |
          chmod +x ./.template/scripts/*.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Clone Target Mod Repo
        if: ${{ inputs.workflow_mode == 'sync' }}
        env:
          MOD_REPO_URL: ${{ inputs.mod_repo_url }}
          MOD_REF: ${{ inputs.mod_ref }}
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
        run: |
          ./.template/scripts/clone_mod.sh

      - name: Validate Consumer Source
        if: ${{ inputs.workflow_mode != 'sync' }}
        env:
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
        run: |
          if [ ! -d "$MOD_REPO_DIR" ]; then
            echo "Expected consumer source directory '$MOD_REPO_DIR' to exist for workflow_mode='${{ inputs.workflow_mode }}'."
            exit 1
          fi

      - name: Resolve Mod Metadata
        env:
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
          MOD_REF: ${{ inputs.mod_ref }}
          WORKFLOW_MODE: ${{ inputs.workflow_mode }}
        run: |
          if [ "$WORKFLOW_MODE" = "sync" ]; then
            short_ref="$(git -C "$MOD_REPO_DIR" rev-parse --short=8 HEAD)"
          else
            short_ref="${MOD_REF:0:8}"
          fi

          if [ -n "${GITHUB_ENV:-}" ]; then
            echo "MOD_SHORT_REF=$short_ref" >> "$GITHUB_ENV"
          else
            echo "MOD_SHORT_REF=$short_ref"
          fi

      - name: Run Localizer
        env:
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
          LOCALIZER_REPO_DIR: ${{ inputs.mod_repo_dir }}
          LOCALIZER_SOURCE_SUBPATHS: ${{ inputs.localizer_source_subpaths }}
          LOCALIZER_DICT_PATH: ${{ inputs.localizer_dict_path }}
        run: |
          dotnet run --project ./.template/DalamudModLocalizer.csproj

      - name: Apply Consumer Patches
        if: ${{ inputs.consumer_patch_glob != '' }}
        env:
          CONSUMER_PATCH_GLOB: ${{ inputs.consumer_patch_glob }}
        run: |
          shopt -s nullglob
          patches=( $CONSUMER_PATCH_GLOB )
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No consumer patches found for glob: $CONSUMER_PATCH_GLOB"
            exit 0
          fi

          for patch in "${patches[@]}"; do
            echo "Applying consumer patch: $patch"
            if git apply --check --whitespace=nowarn "$patch"; then
              git apply --whitespace=nowarn "$patch"
              continue
            fi

            if git apply --reverse --check --whitespace=nowarn "$patch"; then
              echo "Patch already present, skipping: $patch"
              continue
            fi

            echo "Patch could not be applied cleanly: $patch"
            exit 1
          done

      - name: Verify Translation Smoke Test
        if: ${{ inputs.translation_smoke_test_patterns != '' }}
        env:
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
          TRANSLATION_SMOKE_TEST_PATTERNS: ${{ inputs.translation_smoke_test_patterns }}
        run: |
          missing=0
          while IFS= read -r pattern; do
            if [ -z "$pattern" ]; then
              continue
            fi
            if command -v rg >/dev/null 2>&1; then
              search_cmd=(rg -F --quiet --glob '*.cs' --glob '*.json' --glob '*.md' "$pattern" "$MOD_REPO_DIR")
            else
              search_cmd=(grep -R -F -q --include='*.cs' --include='*.json' --include='*.md' "$pattern" "$MOD_REPO_DIR")
            fi

            if "${search_cmd[@]}"; then
              echo "Verified translated pattern: $pattern"
            else
              echo "Missing translated pattern: $pattern"
              missing=1
            fi
          done < <(printf '%s\n' "$TRANSLATION_SMOKE_TEST_PATTERNS")

          if [ "$missing" -ne 0 ]; then
            echo "Translation smoke test failed."
            exit 1
          fi

      - name: Prepare Dalamud Dependencies
        if: ${{ inputs.workflow_mode != 'extract' }}
        env:
          DALAMUD_ASSET_URL: ${{ inputs.dalamud_asset_url }}
          DALAMUD_ASSETS_JSON_URL: ${{ inputs.dalamud_assets_json_url }}
          DALAMUD_REQUIRED_FILES: ${{ inputs.dalamud_required_files }}
        run: |
          ./.template/scripts/prepare_dalamud.sh

      - name: Build Mod
        if: ${{ inputs.workflow_mode != 'extract' }}
        env:
          CI: true
        run: |
          dotnet build "${{ inputs.build_project_path }}" -c Release -p:CustomCS=true -p:EnableWindowsTargeting=true

      - name: Package Build
        if: ${{ inputs.workflow_mode != 'extract' }}
        env:
          MOD_VERSION: ${{ inputs.mod_version }}
          ARTIFACT_BASENAME: ${{ inputs.artifact_basename }}
          PACKAGE_BUILD_DIR: ${{ inputs.package_build_dir }}
          PACKAGE_INCLUDE_PATTERNS: ${{ inputs.package_include_patterns }}
          RELEASE_TAG_PREFIX: ${{ inputs.release_tag_prefix }}
        run: |
          ./.template/scripts/package_build.sh

      - name: Upload Build Artifact
        if: ${{ inputs.workflow_mode != 'extract' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_basename }}-${{ inputs.mod_version }}-${{ env.MOD_SHORT_REF }}
          path: ${{ env.PACKAGED_ZIP }}
          if-no-files-found: error

      - name: Publish Release Asset
        if: ${{ inputs.workflow_mode != 'extract' && inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ inputs.mod_name }} ${{ inputs.mod_version }} (${{ env.MOD_SHORT_REF }})
          files: ${{ env.PACKAGED_ZIP }}
          generate_release_notes: true

      - name: Revert Source Changes For Extract
        if: ${{ inputs.workflow_mode == 'extract' }}
        env:
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
        run: |
          git checkout -- "$MOD_REPO_DIR"

      - name: Commit and Push
        if: ${{ (inputs.workflow_mode == 'sync' || inputs.workflow_mode == 'extract') && inputs.commit_changes }}
        env:
          MOD_REPO_DIR: ${{ inputs.mod_repo_dir }}
        run: |
          rm -rf .template
          if [ "${{ inputs.workflow_mode }}" = "sync" ]; then
            git rm -r --cached "$MOD_REPO_DIR" || true
            rm -rf "$MOD_REPO_DIR/.git"
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-translate: Sync and processed source code"
            git pull --rebase
            git push
          else
            echo "No changes to commit"
          fi
